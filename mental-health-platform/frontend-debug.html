<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>前端请求调试</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 50px auto;
      padding: 20px;
    }
    .section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      background: #06b6d4;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #a0b2b7;
    }
    .result {
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .success {
      background: #d1fae5;
      color: #065f46;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <h1>前端请求调试工具</h1>
  
  <div class="section">
    <h2>步骤1: 登录获取Token</h2>
    <button onclick="testLogin()">登录 counselor1</button>
    <div id="loginResult" class="result"></div>
  </div>
  
  <div class="section">
    <h2>步骤2: 获取预约列表</h2>
    <button onclick="testGetAppointments()">获取预约列表</button>
    <div id="appointmentsResult" class="result"></div>
  </div>
  
  <div class="section">
    <h2>步骤3: 确认预约</h2>
    <input type="text" id="appointmentId" placeholder="输入预约ID" style="padding: 8px; width: 300px;">
    <button onclick="testConfirmAppointment()">确认预约</button>
    <div id="confirmResult" class="result"></div>
  </div>
  
  <div class="section">
    <h2>步骤4: 检查localStorage</h2>
    <button onclick="checkLocalStorage()">检查localStorage</button>
    <div id="storageResult" class="result"></div>
  </div>
  
  <script>
    let token = '';
    let userId = '';
    
    // 创建axios实例（模拟前端配置）
    const request = axios.create({
      baseURL: 'http://localhost:8080/api',
      timeout: 10000
    });
    
    // 请求拦截器
    request.interceptors.request.use(config => {
      console.log('=== 请求拦截器 ===');
      console.log('URL:', config.url);
      console.log('Method:', config.method);
      console.log('BaseURL:', config.baseURL);
      console.log('完整URL:', config.baseURL + config.url);
      
      if (token) {
        config.headers['Authorization'] = `Bearer ${token}`;
        console.log('添加Token:', token.substring(0, 20) + '...');
      }
      
      if (userId) {
        config.headers['userId'] = userId;
        console.log('添加userId:', userId);
      }
      
      console.log('Headers:', config.headers);
      return config;
    });
    
    // 响应拦截器
    request.interceptors.response.use(
      response => {
        console.log('=== 响应成功 ===');
        console.log('Status:', response.status);
        console.log('Data:', response.data);
        return response.data;
      },
      error => {
        console.error('=== 响应错误 ===');
        console.error('Error:', error);
        if (error.response) {
          console.error('Status:', error.response.status);
          console.error('Data:', error.response.data);
        }
        throw error;
      }
    );
    
    async function testLogin() {
      const resultDiv = document.getElementById('loginResult');
      resultDiv.textContent = '登录中...';
      
      try {
        const res = await request.post('/auth/login', {
          username: 'counselor1',
          password: 'admin123'
        });
        
        if (res.code === 200) {
          token = res.data.token;
          userId = res.data.id;
          
          // 保存到localStorage
          localStorage.setItem('token', token);
          localStorage.setItem('userId', userId);
          
          resultDiv.className = 'result success';
          resultDiv.textContent = `登录成功！\n\nuserId: ${userId}\ntoken: ${token.substring(0, 50)}...\n\n已保存到localStorage`;
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `登录失败: ${res.message}`;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `登录错误: ${error.message}\n\n${JSON.stringify(error.response?.data, null, 2)}`;
      }
    }
    
    async function testGetAppointments() {
      const resultDiv = document.getElementById('appointmentsResult');
      resultDiv.textContent = '获取中...';
      
      if (!token || !userId) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请先登录！';
        return;
      }
      
      try {
        const res = await request.get('/counselor/appointments', {
          params: {
            current: 1,
            size: 10,
            status: 0
          }
        });
        
        if (res.code === 200) {
          resultDiv.className = 'result success';
          resultDiv.textContent = `获取成功！\n\n总数: ${res.data.total}\n记录数: ${res.data.records.length}\n\n预约列表:\n${JSON.stringify(res.data.records, null, 2)}`;
          
          // 自动填充第一个预约ID
          if (res.data.records.length > 0) {
            document.getElementById('appointmentId').value = res.data.records[0].id;
          }
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `获取失败: ${res.message}`;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `获取错误: ${error.message}\n\n${JSON.stringify(error.response?.data, null, 2)}`;
      }
    }
    
    async function testConfirmAppointment() {
      const resultDiv = document.getElementById('confirmResult');
      const appointmentId = document.getElementById('appointmentId').value;
      
      if (!appointmentId) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请输入预约ID！';
        return;
      }
      
      if (!token || !userId) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请先登录！';
        return;
      }
      
      resultDiv.textContent = '确认中...';
      
      try {
        console.log('=== 开始确认预约 ===');
        console.log('appointmentId:', appointmentId);
        console.log('userId:', userId);
        console.log('token:', token.substring(0, 20) + '...');
        
        const res = await request.put(`/counselor/appointments/${appointmentId}/confirm`);
        
        console.log('=== 确认结果 ===');
        console.log('Response:', res);
        
        if (res.code === 200) {
          resultDiv.className = 'result success';
          resultDiv.textContent = `确认成功！\n\n${JSON.stringify(res, null, 2)}`;
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `确认失败: ${res.message}\n\n${JSON.stringify(res, null, 2)}`;
        }
      } catch (error) {
        console.error('=== 确认错误 ===');
        console.error('Error:', error);
        
        resultDiv.className = 'result error';
        resultDiv.textContent = `确认错误: ${error.message}\n\nStatus: ${error.response?.status}\n\n${JSON.stringify(error.response?.data, null, 2)}`;
      }
    }
    
    function checkLocalStorage() {
      const resultDiv = document.getElementById('storageResult');
      
      const storage = {
        token: localStorage.getItem('token'),
        userId: localStorage.getItem('userId'),
        userInfo: localStorage.getItem('userInfo')
      };
      
      resultDiv.className = 'result';
      resultDiv.textContent = `localStorage内容:\n\n${JSON.stringify(storage, null, 2)}`;
    }
  </script>
</body>
</html>
